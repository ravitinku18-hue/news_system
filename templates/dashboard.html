<!DOCTYPE html>
<!-- ============================================================
     FILE: templates/dashboard.html
     PURPOSE: The visual dashboard website
              - Shows article thumbnails in a grid
              - Auto-cycles highlighted article every 4 seconds
              - Filter buttons for Law & Order / Political
              - Download buttons for PDF digests
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telangana Police — News Intelligence Dashboard</title>
  <style>
    /* Reset all default browser margins and padding */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Dark background for the whole page */
    body {
      background: #0a0e1a;
      font-family: Arial, sans-serif;
      color: #e8eaf0;
      min-height: 100vh;
    }

    /* Top header bar with logo and badge */
    .header {
      background: linear-gradient(135deg, #0d1b2e, #1a2744);
      border-bottom: 2px solid #c8a45a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Logo text styling */
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #c8a45a;
    }
    .logo span { color: #ffffff; }

    /* Confidential badge top right */
    .badge {
      background: #c8a45a;
      color: #0a0e1a;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    /* Date and stats bar below header */
    .info-bar {
      background: #111827;
      padding: 6px 24px;
      font-size: 11px;
      color: #6b7280;
      letter-spacing: 1px;
      border-bottom: 1px solid #1e2a3a;
    }

    /* Filter tab buttons */
    .tabs {
      display: flex;
      padding: 0 24px;
      background: #0d1525;
      border-bottom: 1px solid #1e2a3a;
      gap: 0;
    }

    /* Individual tab button */
    .tab {
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    /* Active/selected tab styling */
    .tab.active {
      color: #c8a45a;
      border-bottom-color: #c8a45a;
    }

    /* Grid container for article cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3 columns */
      gap: 14px;
      padding: 20px 24px;
    }

    /* Individual article card */
    .card {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    /* Card hover effect */
    .card:hover {
      border-color: #c8a45a;
      transform: translateY(-2px);
    }

    /* Currently active/highlighted card */
    .card.active-card {
      border-color: #c8a45a;
      box-shadow: 0 0 16px rgba(200, 164, 90, 0.3);
    }

    /* Image area at top of card */
    .card-img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      /* Fallback gradient if no image */
      background: linear-gradient(135deg, #1e2a3a, #2a3a52);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #c8a45a;
    }

    /* Red image background for law & order cards */
    .card-img.red {
      background: linear-gradient(135deg, #2a1e1e, #3a2020);
      color: #e05252;
    }

    /* Blue image background for political cards */
    .card-img.blue {
      background: linear-gradient(135deg, #1e1e2a, #1e2a3a);
      color: #5272e0;
    }

    /* Text content area inside card */
    .card-body { padding: 10px 12px; }

    /* Category label tag on each card */
    .cat-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 6px;
    }

    /* Red tag for Law & Order */
    .cat-tag.lo { background: #2a1e1e; color: #e05252; }

    /* Blue tag for Political */
    .cat-tag.pol { background: #1e222a; color: #5272e0; }

    /* Article headline text */
    .card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      color: #d1d5db;
      margin-bottom: 6px;
    }

    /* Bottom meta line: source and language */
    .card-meta {
      font-size: 10px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Language badge (TE+EN, EN, etc.) */
    .lang-badge {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 2px;
      background: #1e2a3a;
      color: #c8a45a;
      font-weight: 600;
    }

    /* Progress bar at bottom of active card */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #c8a45a;
      transition: width 0.1s linear;
    }

    /* Bottom scrolling news ticker */
    .ticker {
      background: #0d1525;
      border-top: 1px solid #1e2a3a;
      padding: 8px 24px;
      font-size: 11px;
      display: flex;
      gap: 16px;
      align-items: center;
      overflow: hidden;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    /* LIVE label in ticker */
    .ticker-label {
      background: #c8a45a;
      color: #0a0e1a;
      font-weight: 700;
      font-size: 9px;
      padding: 2px 8px;
      letter-spacing: 1px;
      white-space: nowrap;
      border-radius: 2px;
    }

    /* Scrolling ticker text animation */
    .ticker-text {
      white-space: nowrap;
      animation: scroll-ticker 40s linear infinite;
      color: #9ca3af;
    }

    /* Keyframe: scrolls text from right to left */
    @keyframes scroll-ticker {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }

    /* PDF download section */
    .pdf-section {
      padding: 20px 24px;
      margin-bottom: 60px; /* space for fixed ticker */
    }

    /* Section heading */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #c8a45a;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* Individual PDF download row */
    .pdf-row {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Download button */
    .dl-btn {
      background: #1a3a6b;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .dl-btn:hover { background: #c8a45a; color: #0a0e1a; }

    /* Green blinking dot to indicate live status */
    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 1s infinite;
      margin-right: 6px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* Space at bottom so ticker doesn't cover content */
    .bottom-space { height: 60px; }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="logo">
    TELANGANA POLICE &nbsp;<span>NEWS INTELLIGENCE</span>
  </div>
  <div style="display:flex; gap:12px; align-items:center;">
    <span style="font-size:11px; color:#6b7280;">
      <span class="live-dot"></span>LIVE
    </span>
    <span class="badge">DGP OFFICE — CONFIDENTIAL</span>
  </div>
</div>

<!-- ===== INFO BAR ===== -->
<div class="info-bar" id="info-bar">
  Loading today's news digest...
</div>

<!-- ===== FILTER TABS ===== -->
<div class="tabs">
  <button class="tab active" onclick="filterArticles('all', this)">
    ALL NEWS
  </button>
  <button class="tab" onclick="filterArticles('law_and_order', this)">
    ⚖ LAW &amp; ORDER
  </button>
  <button class="tab" onclick="filterArticles('political', this)">
    🏛 POLITICAL
  </button>
  <button class="tab" onclick="showPDFs()">
    📄 DOWNLOAD PDFs
  </button>
</div>

<!-- ===== ARTICLE GRID ===== -->
<div class="grid" id="article-grid">
  <!-- Cards are injected here by JavaScript -->
  <p style="color:#6b7280; padding:20px; grid-column:1/-1;">
    Loading articles...
  </p>
</div>

<!-- ===== PDF DOWNLOAD SECTION (hidden by default) ===== -->
<div class="pdf-section" id="pdf-section" style="display:none;">
  <div class="section-title">📄 GENERATED DIGEST PDFs</div>
  <div id="pdf-list">Loading...</div>
</div>

<div class="bottom-space"></div>

<!-- ===== TICKER ===== -->
<div class="ticker">
  <span class="ticker-label">LIVE UPDATES</span>
  <span class="ticker-text" id="ticker-text">Loading
